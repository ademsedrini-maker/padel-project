<app-navbar></app-navbar>

<div class="page">
  <h1>Gestion des membres</h1>

  <div *ngIf="erreur" class="alert-error">
    {{ erreur }}
  </div>

  <div *ngIf="authService.isAdminGlobal()" class="info-banner">
    Vue globale — tous les sites
  </div>

  <div *ngIf="authService.isAdminSite()" class="info-banner">
    Site : <strong>{{ authService.getSiteAdmin() }}</strong>
  </div>

  <div *ngIf="membres.length === 0 && !erreur" class="empty">
    Aucun membre trouvé.
  </div>

  <table *ngIf="membres.length > 0">
    <thead>
    <tr>
      <th>Matricule</th>
      <th>Nom</th>
      <th>Prénom</th>
      <th>Email</th>
      <th>Type</th>
      <th *ngIf="authService.isAdminGlobal()">Site</th>
      <th>Solde</th>
    </tr>
    </thead>

    <tbody>
    <tr *ngFor="let m of membres">
      <td><code>{{ m.matricule }}</code></td>
      <td>{{ m.nom }}</td>
      <td>{{ m.prenom }}</td>
      <td>{{ m.email }}</td>
      <td>
          <span [class]="'badge ' + getTypeBadgeClass(m.typeMembre)">
            {{ m.typeMembre }}
          </span>
      </td>
      <td *ngIf="authService.isAdminGlobal()">
        {{ m.site || '—' }}
      </td>
      <td [class]="m.solde < 0 ? 'solde-negatif' : 'solde-positif'">
        {{ m.solde | number:'1.2-2' }} €
      </td>
    </tr>
    </tbody>
  </table>
</div>
