<app-navbar></app-navbar>

<div class="page">
  <h1>Dashboard</h1>

  <!-- Message membre -->
  <div *ngIf="!authService.isAdmin()">
    <p>Bienvenue <strong>{{ authService.currentUser()?.nom }}</strong> !</p>
    <p>Matricule : <strong>{{ authService.currentUser()?.matricule }}</strong></p>
  </div>

  <!-- Message admin global -->
  <div *ngIf="authService.isAdminGlobal()">
    <p>Bienvenue <strong>Administrateur Global</strong></p>
    <p>Vous avez accès à tous les sites.</p>
  </div>

  <!-- Message admin site -->
  <div *ngIf="authService.isAdminSite()">
    <p>Bienvenue <strong>{{ authService.currentUser()?.nom }}</strong></p>
    <p>Vous gérez le site : <strong>{{ authService.getSiteAdmin() }}</strong></p>
  </div>
</div>
