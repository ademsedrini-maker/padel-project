<div class="register-container">

  <!-- Formulaire d'inscription -->
  <div *ngIf="!inscriptionReussie">
    <h1>Créer un compte</h1>

    <form (ngSubmit)="onRegister()">
      <label> for="nom">Nom</label>
      <input id="nom" name="nom" type="text" [(ngModel)]="nom" required />

      <label> for="prenom">Prénom</label>
      <input id="prenom" name="prenom" type="text" [(ngModel)]="prenom" required />

      <label> for="email">Email</label>
      <input id="email" name="email" type="email" [(ngModel)]="email" required />

      <button type="submit">S'inscrire</button>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>

    <p class="login-link">
      Déjà un compte ? <a routerLink="/login-membre">Se connecter</a>
    </p>
  </div>

  <!-- Après inscription réussie -->
  <div *ngIf="inscriptionReussie" class="success-box">
    <h1>Inscription réussie !</h1>
    <p>Votre matricule est :</p>
    <div class="matricule">{{ matriculeGenere }}</div>
    <p class="warning">Notez bien ce matricule, il vous servira à vous connecter.</p>
    <button (click)="router.navigate(['/login-membre'])">
      Se connecter
    </button>
  </div>

</div>
